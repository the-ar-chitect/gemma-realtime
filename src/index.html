<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <h1>Parlor</h1>
  </div>
  <span id="modelLabel" class="model-label">Gemma 4</span>
  <div id="status" class="status-pill disconnected">Disconnected</div>
</header>

<div class="portal-stack">
  <!-- Settings bar -->
  <div class="settings-bar">
    <button id="connectToggle" class="ctrl-btn">Connect</button>
    <button id="micToggle" class="ctrl-btn active">Mic On</button>
    <button id="cameraToggle" class="ctrl-btn active">Camera On</button>
    <div class="setting-group">
      <label for="maxTurns" class="setting-label">History turns</label>
      <input id="maxTurns" type="number" class="setting-input" value="20" min="1" max="200" readonly title="Set via MAX_HISTORY_TURNS env var on server">
    </div>
    <div class="setting-group">
      <span id="contextInfo" class="setting-label">128K ctx</span>
    </div>
    <div class="setting-group">
      <span id="sessionInfo" class="setting-label"></span>
    </div>
  </div>

  <!-- Tool call log -->
  <div id="toolLog" class="tool-log" hidden></div>

  <!-- Webcam viewport with glow layers -->
  <div id="viewportWrap" class="viewport-wrap loading">
    <div class="viewport-glow"></div>
    <video id="video" autoplay muted playsinline></video>
  </div>

  <!-- Audio waveform visualizer -->
  <div class="waveform-wrap">
    <canvas id="waveform"></canvas>
  </div>

  <!-- Transcript -->
  <div id="messages" class="transcript"></div>

  <!-- Controls -->
  <div class="controls">
    <div class="state-indicator">
      <div id="stateDot" class="dot loading"></div>
      <span id="stateText">Idle</span>
    </div>
    <span id="turnCounter" class="turn-counter"></span>
    <span class="on-device-pill">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
      On-device
    </span>
  </div>

  <!-- Chat input -->
  <div id="chatBar" class="chat-bar" hidden>
    <input id="chatInput" type="text" class="chat-input" placeholder="Type a message..." autocomplete="off">
    <button id="chatSend" class="ctrl-btn chat-send">Send</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
